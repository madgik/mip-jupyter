name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install client
        run: python3 -m pip install -e ./python-client
      - name: Unit tests
        run: python3 -m unittest discover -s python-client/tests -p "test_*.py"
      - name: Smoke script
        run: python3 python-client/verify_script.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build notebook image
        run: docker build --platform linux/amd64 -f docker/singleuser/Dockerfile -t mip-jupyter:ci .
      - name: Build hub image
        run: docker build --platform linux/amd64 -f docker/hub/Dockerfile -t mip-jupyterhub:ci .
